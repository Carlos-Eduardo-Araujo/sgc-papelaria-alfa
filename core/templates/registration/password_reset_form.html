<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Senha - Papelaria Alfa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh; background-color: #0A2540 !important;">
    <div class="card p-4 shadow-sm" style="max-width: 400px; width: 100%;">
        <h4 class="mb-3 text-center" style="color: #0A2540;">📚 Recuperar Senha</h4>
        <p class="text-muted small text-center">Introduza o seu e-mail e enviar-lhe-emos as instruções.</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="O seu e-mail" required>
            </div>
            <button type="submit" class="btn text-white w-100" style="background-color: #FF6D00;">Enviar E-mail</button>
        </form>
        
        <div class="text-center mt-3">
            <a href="/app/login/" class="text-decoration-none small">Voltar ao Login</a>
        </div>
    </div>
</body>
</html>
