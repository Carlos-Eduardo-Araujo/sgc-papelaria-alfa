{% extends 'core/base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-header bg-white"><h5 class="mb-0">Novo Produto</h5></div>
            <div class="card-body">
                <form id="form-produto">
                    <div class="mb-2"><input type="text" id="nome" class="form-control" placeholder="Nome do Produto" required></div>
                    <div class="mb-2"><textarea id="descricao" class="form-control" placeholder="Descrição" required></textarea></div>
                    <div class="mb-2">
                        <label class="form-label small text-muted">Preço (R$)</label>
                        <input type="number" step="0.01" min="0" id="preco" class="form-control" placeholder="0.00" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label small text-muted">Qtd. em Estoque</label>
                        <input type="number" id="quantidade_estoque" class="form-control" value="0" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-muted">Estoque Mínimo</label>
                        <input type="number" id="estoque_minimo" class="form-control" value="5" required>
                    </div>
                    <button type="submit" class="btn btn-custom w-100">Salvar Produto</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white"><h5 class="mb-0">Lista de Produtos</h5></div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead><tr><th>Nome</th><th>Preço</th><th>Estoque</th><th>Mínimo</th><th>Ações</th></tr></thead>
                    <tbody id="tabela-produtos">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const token = localStorage.getItem('access_token');

    // PATCH /produtos/{id} (Atualizar apenas o estoque)
    async function editarEstoque(id, estoqueAtual) {
        const novoEstoque = prompt("Digite a nova quantidade total em estoque:", estoqueAtual);
        
        // Se o usuário digitou algo e não cancelou
        if (novoEstoque !== null && novoEstoque.trim() !== "") {
            const response = await fetch(`/produtos/${id}`, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ quantidade_estoque: parseInt(novoEstoque) })
            });

            if(response.ok) {
                carregarProdutos(); // Recarrega a tabela com o novo valor instantaneamente
            } else {
                alert('Erro ao atualizar o estoque.');
            }
        }
    }

    // GET /produtos
    async function carregarProdutos() {
        const response = await fetch('/produtos', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const produtos = await response.json();
        const tbody = document.getElementById('tabela-produtos');
        tbody.innerHTML = '';
        
        produtos.forEach(p => {
            tbody.innerHTML += `
                <tr>
                    <td>${p.nome}</td>
                    <td>R$ ${parseFloat(p.preco).toFixed(2)}</td>
                    <td>${p.quantidade_estoque}</td>
                    <td>${p.estoque_minimo}</td>
                    <td>
                        <button class="btn btn-sm btn-warning me-1" onclick="editarEstoque(${p.id}, ${p.quantidade_estoque})">Estoque</button>
                        <button class="btn btn-sm btn-danger" onclick="deletarProduto(${p.id})">Excluir</button>
                    </td>
                </tr>
            `;
        });
    }

    // POST /produtos
    document.getElementById('form-produto').addEventListener('submit', async function(e) {
        e.preventDefault();
        const dados = {
            nome: document.getElementById('nome').value,
            descricao: document.getElementById('descricao').value,
            preco: parseFloat(document.getElementById('preco').value),
            quantidade_estoque: parseInt(document.getElementById('quantidade_estoque').value),
            estoque_minimo: parseInt(document.getElementById('estoque_minimo').value)
        };

        const response = await fetch('/produtos', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(dados)
        });

        if (response.ok) {
            alert('Produto salvo com sucesso!');
            this.reset();
            carregarProdutos();
        } else {
            const erro = await response.json();
            alert('Erro ao salvar: ' + JSON.stringify(erro));
        }
    });

    // DELETE /produtos/{id}
    async function deletarProduto(id) {
        if(confirm('Tem certeza?')) {
            const response = await fetch(`/produtos/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if(response.ok) {
                carregarProdutos();
            } else {
                alert('Erro ao excluir.');
            }
        }
    }

    carregarProdutos();
</script>
{% endblock %}
