<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Papelaria Alfa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0A2540; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 2rem; border-radius: 10px; width: 100%; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-custom { background-color: #FF6D00; color: white; width: 100%; }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="text-center mb-4">📚 SGC Alfa</h3>
        <div id="msg-erro" class="alert alert-danger d-none"></div>
        
        <form id="form-login">
            <div class="mb-3">
                <label>Usuário</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Senha</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-custom">Entrar</button>
        </form>
        <div class="text-center mt-3">
            <a href="/password_reset/" style="color: #0A2540;">Esqueceu a senha?</a>
        </div>
    </div>

    <script>
        document.getElementById('form-login').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                // Chamando a API REST do Django
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Salva o JWT no navegador
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    window.location.href = '/app/clientes/'; // Redireciona
                } else {
                    document.getElementById('msg-erro').textContent = 'Credenciais inválidas!';
                    document.getElementById('msg-erro').classList.remove('d-none');
                }
            } catch (error) {
                console.error('Erro:', error);
            }
        });
    </script>
</body>
</html>
