<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGC - Papelaria Alfa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --cor-primaria: #0A2540; /* Azul Marinho */
            --cor-secundaria: #FF6D00; /* Laranja Papelaria */
        }
        body { background-color: #f8f9fa; }
        .navbar-custom { background-color: var(--cor-primaria); }
        .navbar-custom .navbar-brand, .navbar-custom .nav-link { color: white; }
        .btn-custom { background-color: var(--cor-secundaria); color: white; border: none; }
        .btn-custom:hover { background-color: #e65c00; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/app/">📚 SGC - Papelaria Alfa</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/app/clientes/">Clientes</a></li>
                    <li class="nav-item"><a class="nav-link" href="/app/produtos/">Produtos</a></li> <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="fazerLogout()">Sair</a></li>
                    <li class="nav-item"><a class="nav-link" href="/app/vendas/">Vendas</a></li>
                    <li class="nav-item"><a class="nav-link" href="/app/relatorios/">Relatórios</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
        // Função global para verificar se o usuário está logado
        function checarLogin() {
            const token = localStorage.getItem('access_token');
            if (!token && window.location.pathname !== '/app/login/') {
                window.location.href = '/app/login/';
            }
        }
        
        function fazerLogout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.href = '/app/login/';
        }

        checarLogin(); // Executa ao carregar qualquer página
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
