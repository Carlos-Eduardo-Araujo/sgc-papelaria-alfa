{% extends 'core/base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-header bg-white"><h5 class="mb-0">Novo Cliente</h5></div>
            <div class="card-body">
                <form id="form-cliente">
                    <div class="mb-2"><input type="text" id="nome" class="form-control" placeholder="Nome" required></div>
                    <div class="mb-2"><input type="text" id="cpf" class="form-control" placeholder="CPF" required></div>
                    <div class="mb-2"><input type="email" id="email" class="form-control" placeholder="E-mail" required></div>
                    <div class="mb-2"><input type="text" id="telefone" class="form-control" placeholder="Telefone" required></div>
                    <div class="mb-3"><input type="text" id="endereco" class="form-control" placeholder="Endereço Completo" required></div>
                    <button type="submit" class="btn btn-custom w-100">Salvar Cliente</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white"><h5 class="mb-0">Lista de Clientes</h5></div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead><tr><th>Nome</th><th>CPF</th><th>Email</th><th>Telefone</th><th>Ações</th></tr></thead>
                    <tbody id="tabela-clientes">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const token = localStorage.getItem('access_token');

    // GET /clientes (Listar)
    async function carregarClientes() {
        const response = await fetch('/clientes', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const clientes = await response.json();
        const tbody = document.getElementById('tabela-clientes');
        tbody.innerHTML = '';
        
        clientes.forEach(c => {
           tbody.innerHTML += `
                <tr>
                    <td>${c.nome}</td>
                    <td>${c.cpf}</td>
                    <td>${c.email}</td>
                    <td>${c.telefone || 'N/A'}</td> <td>
                        <button class="btn btn-sm btn-danger" onclick="deletarCliente(${c.id})">Excluir</button>
                    </td>
                </tr>
            `;
        });
    }

    // POST /clientes (Incluir)
    document.getElementById('form-cliente').addEventListener('submit', async function(e) {
        e.preventDefault();
        const dados = {
            nome: document.getElementById('nome').value,
            cpf: document.getElementById('cpf').value,
            email: document.getElementById('email').value,
            telefone: document.getElementById('telefone').value,
            endereco: document.getElementById('endereco').value // <-- Adicionado aqui!
        };

        const response = await fetch('/clientes', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(dados)
        });

        if (response.ok) {
            alert('Cliente salvo com sucesso!');
            this.reset();
            carregarClientes(); // Atualiza a tabela na hora
        } else {
            const erro = await response.json();
            alert('Erro ao salvar: ' + JSON.stringify(erro));
        }
    });

    // DELETE /clientes/{id} (Excluir)
    async function deletarCliente(id) {
        if(confirm('Tem certeza?')) {
            const response = await fetch(`/clientes/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if(response.ok) {
                carregarClientes();
            } else {
                const erro = await response.json();
                alert(erro.detail || 'Erro ao excluir.');
            }
        }
    }

    // Inicia o carregamento
    carregarClientes();
</script>
{% endblock %}
